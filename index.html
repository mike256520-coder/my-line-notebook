<!DOCTYPE html>
<!-- 1. index.html (結構)
這個檔案定義了輸入區域、標籤過濾顯示區以及貼文列表。 -->
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notebook - 類 LINE 記事本</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="text" id="quick-search" placeholder="輸入標籤搜尋..." 
       onchange="window.filterByTag(this.value.replace('#',''))">
    <div class="container">
        <header>
            <h1>記事本</h1>
            <div id="active-filter" class="hidden">
                正在查看標籤: <span id="current-tag"></span>
                <button onclick="clearFilter()">清除過濾</button>
            </div>
        </header>

        <section class="post-box">
            <textarea id="post-input" placeholder="分享你的想法... (使用 #標籤)"></textarea>
            <button id="submit-btn">發佈</button>
        </section>

        <main id="post-list">
            <div class="loading">載入中...</div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
