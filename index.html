<!DOCTYPE html>
<!-- 
* index.html (結構)這個檔案定義了輸入區域、標籤過濾顯示區以及貼文列表。
*  ai  https://gemini.google.com/share/bda16ca30354
-->
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 文字版-記事本</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            [文字版記事本] #待分。#金融。#音樂 #吉他。#醫健。#水電。#PC。#英文。#歷史 #搜奇。#--。#--
			<div class="search-area">
        <input type="text" id="search-input" placeholder="搜尋標簽...">
        <button id="search-btn">搜尋</button>
    </div>
            <div id="active-filter" class="hidden">
                正在查看標籤: <span id="current-tag"></span>
                <button onclick="clearFilter()">清除搜尋</button>
            </div>
        </header>

        <section class="post-box">
            <textarea id="post-input" placeholder="#標簽...FB崁入連接"></textarea>
            <button id="submit-btn">送出</button>
        </section>

        <main id="post-list">
            <div class="loading">載入中...</div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
