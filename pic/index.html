<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notebook - LINE pic記事本</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>=PIC記事本=</h1>
			<div class="search-area">
        <input type="text" id="search-input" placeholder="all,mon,mus,heal,wat,his,...">
        <button id="search-btn">搜尋</button>
    </div>
            <div id="active-filter" class="hidden">
                正在查看標籤: <span id="current-tag"></span>
                <button onclick="clearFilter()">清除搜找</button>
            </div>
        </header>

        <section class="post-box">
            <textarea id="post-input" placeholder="key內容... (使用 #標籤)"></textarea>
            <button id="submit-btn">發佈</button>
        </section>

        <main id="post-list">
            <div class="loading">載入中...</div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
